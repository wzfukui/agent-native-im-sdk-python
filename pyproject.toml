[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agent-im"
version = "0.1.0"
description = "Python SDK for Agent-Native IM platform"
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
dependencies = [
    "websockets>=12.0",
    "httpx>=0.27.0",
]

[project.urls]
Repository = "https://github.com/wzfukui/agent-native-im-sdk"
